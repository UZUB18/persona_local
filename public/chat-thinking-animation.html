<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Thinking Animation</title>
    <style>
      :root {
        color: #171717;
        background: #f6f6f3;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 12px;
      }

      .thinking-panel {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #474742;
        background: #f0f0eb;
        border: 1px solid #e4e2db;
        border-radius: 8px;
        padding: 8px 11px;
        font-weight: 650;
      }

      .mailbot-scene {
        position: relative;
        width: 62px;
        height: 28px;
      }

      .mailbot {
        position: absolute;
        top: 6px;
        width: 18px;
        height: 16px;
        border-radius: 5px;
        background: #2f8f86;
        box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.12);
        animation: mailbot-bob 1.8s ease-in-out infinite;
      }

      .mailbot::before {
        content: "";
        position: absolute;
        left: 5px;
        top: -5px;
        width: 8px;
        height: 5px;
        border-radius: 8px 8px 0 0;
        background: #2f8f86;
      }

      .mailbot::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 5px;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #f0f0eb;
        box-shadow: 7px 0 0 #f0f0eb;
      }

      .mailbot i {
        position: absolute;
        left: 8px;
        top: -9px;
        width: 2px;
        height: 5px;
        background: #2f8f86;
      }

      .mailbot.left {
        left: 0;
      }

      .mailbot.right {
        right: 0;
        animation-delay: 0.28s;
      }

      .mail-envelope {
        position: absolute;
        left: 24px;
        top: 10px;
        width: 14px;
        height: 10px;
        border-radius: 2px;
        background:
          linear-gradient(145deg, transparent 48%, rgba(0, 0, 0, 0.18) 50%, transparent 52%),
          linear-gradient(35deg, transparent 48%, rgba(0, 0, 0, 0.18) 50%, transparent 52%),
          #efe6ce;
        border: 1px solid rgba(47, 143, 134, 0.38);
        animation: mail-transfer 1.8s ease-in-out infinite;
      }

      .thinking-label {
        min-width: 68px;
      }

      @keyframes mailbot-bob {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-2px);
        }
      }

      @keyframes mail-transfer {
        0% {
          opacity: 0;
          transform: translateX(-11px) translateY(0) rotate(-8deg);
        }

        18%,
        72% {
          opacity: 1;
        }

        50% {
          transform: translateX(0) translateY(-5px) rotate(3deg);
        }

        100% {
          opacity: 0;
          transform: translateX(11px) translateY(0) rotate(8deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="thinking-panel" aria-live="polite">
      <div class="mailbot-scene" aria-hidden="true">
        <span class="mailbot left"><i></i></span>
        <span class="mail-envelope"></span>
        <span class="mailbot right"><i></i></span>
      </div>
      <span class="thinking-label">Thinking...</span>
    </div>
  </body>
</html>
