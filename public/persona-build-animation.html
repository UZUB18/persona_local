<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persona Build Animation</title>
    <style>
      :root {
        color: #f6f2e8;
        background: #0f0f0e;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 18% 16%, rgba(43, 179, 167, 0.18), transparent 26%),
          radial-gradient(circle at 82% 76%, rgba(206, 138, 61, 0.16), transparent 28%),
          #0f0f0e;
      }

      .build-stage {
        width: min(1120px, 100%);
        display: grid;
        grid-template-columns: minmax(320px, 0.92fr) 1fr;
        gap: 20px;
        align-items: stretch;
        min-height: 360px;
        padding: 18px;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 20%, rgba(43, 179, 167, 0.26), transparent 28%),
          radial-gradient(circle at 82% 74%, rgba(206, 138, 61, 0.22), transparent 30%),
          #161614;
        border: 1px solid #2f2d28;
        border-radius: 8px;
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.38);
      }

      .build-visual {
        position: relative;
        min-height: 320px;
        overflow: hidden;
        border: 1px solid rgba(239, 230, 206, 0.16);
        border-radius: 8px;
        background: #10100f;
        isolation: isolate;
      }

      .scan-grid {
        position: absolute;
        inset: 0;
        opacity: 0.48;
        background-image:
          linear-gradient(rgba(246, 242, 232, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(246, 242, 232, 0.07) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      .source-ribbons {
        position: absolute;
        inset: 24px;
        z-index: 1;
      }

      .source-ribbons span {
        position: absolute;
        left: -18%;
        width: 46%;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, #2bb3a7, #efe6ce, transparent);
        opacity: 0;
        animation: ribbon-pass 2.6s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
      }

      .source-ribbons span:nth-child(1) {
        top: 18%;
      }

      .source-ribbons span:nth-child(2) {
        top: 39%;
        animation-delay: 0.46s;
      }

      .source-ribbons span:nth-child(3) {
        top: 62%;
        animation-delay: 0.92s;
      }

      .source-ribbons span:nth-child(4) {
        top: 81%;
        animation-delay: 1.36s;
      }

      .persona-core {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: grid;
        place-items: center;
      }

      .core-ring {
        position: absolute;
        width: min(54%, 210px);
        aspect-ratio: 1;
        border: 1px solid rgba(239, 230, 206, 0.42);
        border-top-color: #2bb3a7;
        border-right-color: #ce8a3d;
        border-radius: 50%;
        box-shadow: 0 0 38px rgba(43, 179, 167, 0.2);
        animation: core-turn 3.8s linear infinite;
      }

      .core-card {
        width: min(58%, 230px);
        min-height: 154px;
        padding: 18px;
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 14px;
        align-items: center;
        background: rgba(246, 242, 232, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.58);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
        animation: card-breathe 2.4s ease-in-out infinite;
      }

      .portrait-mark {
        width: 56px;
        height: 72px;
        border-radius: 26px 26px 12px 12px;
        background:
          radial-gradient(circle at 50% 22%, #171717 0 14px, transparent 15px),
          linear-gradient(#171717 0 0) center bottom / 42px 31px no-repeat;
      }

      .prompt-lines {
        display: grid;
        gap: 9px;
      }

      .prompt-lines span {
        height: 7px;
        border-radius: 999px;
        background: #24241f;
        transform-origin: left;
        animation: prompt-write 1.8s ease-in-out infinite;
      }

      .prompt-lines span:nth-child(2) {
        width: 76%;
        animation-delay: 0.18s;
      }

      .prompt-lines span:nth-child(3) {
        width: 58%;
        animation-delay: 0.36s;
      }

      .trait-cloud {
        position: absolute;
        inset: 18px;
        z-index: 3;
        pointer-events: none;
      }

      .trait-cloud span {
        --chip-index: 0;
        position: absolute;
        min-width: 72px;
        min-height: 28px;
        padding: 6px 10px;
        color: #efe6ce;
        background: rgba(16, 16, 15, 0.72);
        border: 1px solid rgba(239, 230, 206, 0.24);
        border-radius: 999px;
        font-size: 12px;
        font-weight: 760;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        animation: chip-orbit 4.2s ease-in-out infinite;
        animation-delay: calc(var(--chip-index) * -0.42s);
      }

      .trait-cloud span:nth-child(1) {
        left: 8%;
        top: 12%;
      }

      .trait-cloud span:nth-child(2) {
        right: 8%;
        top: 18%;
      }

      .trait-cloud span:nth-child(3) {
        left: 10%;
        bottom: 20%;
      }

      .trait-cloud span:nth-child(4) {
        right: 6%;
        bottom: 16%;
      }

      .trait-cloud span:nth-child(5) {
        left: 38%;
        top: 4%;
      }

      .trait-cloud span:nth-child(6) {
        left: 35%;
        bottom: 5%;
      }

      .build-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
        padding: 18px 10px 18px 2px;
      }

      .status-stack {
        position: relative;
        min-height: 168px;
      }

      .status-line {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        opacity: 0;
        transform: translateY(18px);
        animation: status-cycle 3.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .status-line:nth-child(2) {
        animation-delay: 3.6s;
      }

      .status-line:nth-child(3) {
        animation-delay: 7.2s;
      }

      .status-line:nth-child(4) {
        animation-delay: 10.8s;
      }

      .status-line:nth-child(5) {
        animation-name: status-hold;
        animation-duration: 1.4s;
        animation-delay: 14.4s;
      }

      .status-label {
        display: block;
        margin-bottom: 10px;
        color: #cdbf9d;
        font-size: 13px;
        font-weight: 720;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .status-text {
        margin: 0;
        color: #fffaf0;
        font-size: clamp(34px, 4.4vw, 56px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
      }

      .progress-dots {
        display: flex;
        gap: 8px;
        margin-top: 24px;
      }

      .progress-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2bb3a7;
        opacity: 0.32;
        animation: dot-pulse 1.2s ease-in-out infinite;
      }

      .progress-dots span:nth-child(2) {
        animation-delay: 0.18s;
      }

      .progress-dots span:nth-child(3) {
        animation-delay: 0.36s;
      }

      @keyframes ribbon-pass {
        0% {
          opacity: 0;
          transform: translateX(0) scaleX(0.6);
        }

        18%,
        62% {
          opacity: 0.9;
        }

        100% {
          opacity: 0;
          transform: translateX(185%) scaleX(1);
        }
      }

      @keyframes core-turn {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes card-breathe {
        0%,
        100% {
          transform: scale(0.985);
        }

        50% {
          transform: scale(1.02);
        }
      }

      @keyframes prompt-write {
        0%,
        100% {
          transform: scaleX(0.34);
          opacity: 0.52;
        }

        46%,
        72% {
          transform: scaleX(1);
          opacity: 1;
        }
      }

      @keyframes chip-orbit {
        0%,
        100% {
          opacity: 0.34;
          transform: translateY(8px) scale(0.94);
        }

        45% {
          opacity: 1;
          transform: translateY(-4px) scale(1);
        }
      }

      @keyframes status-cycle {
        0%,
        22% {
          opacity: 0;
          transform: translateY(18px);
        }

        38%,
        62% {
          opacity: 1;
          transform: translateY(0);
        }

        82%,
        100% {
          opacity: 0;
          transform: translateY(-14px);
        }
      }

      @keyframes status-hold {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes dot-pulse {
        0%,
        100% {
          opacity: 0.25;
          transform: scale(0.78);
        }

        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 16px;
        }

        .build-stage {
          grid-template-columns: 1fr;
          min-height: 0;
          padding: 12px;
        }

        .build-visual {
          min-height: 250px;
        }

        .build-copy {
          padding: 4px 4px 8px;
        }
      }
    </style>
  </head>
  <body>
    <section class="build-stage" aria-label="Persona build animation preview">
      <div class="build-visual" aria-hidden="true">
        <div class="scan-grid"></div>
        <div class="source-ribbons">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="persona-core">
          <div class="core-ring"></div>
          <div class="core-card">
            <div class="portrait-mark"></div>
            <div class="prompt-lines">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
        <div class="trait-cloud">
          <span style="--chip-index: 0">voice</span>
          <span style="--chip-index: 1">memory</span>
          <span style="--chip-index: 2">beliefs</span>
          <span style="--chip-index: 3">tone</span>
          <span style="--chip-index: 4">motives</span>
          <span style="--chip-index: 5">style</span>
        </div>
      </div>
      <div class="build-copy">
        <div class="status-stack" aria-live="polite">
          <div class="status-line">
            <span class="status-label">Initializing</span>
            <span class="status-text">Reading the signal</span>
          </div>
          <div class="status-line">
            <span class="status-label">Researching</span>
            <span class="status-text">Gathering context</span>
          </div>
          <div class="status-line">
            <span class="status-label">Synthesizing</span>
            <span class="status-text">Shaping the voice</span>
          </div>
          <div class="status-line">
            <span class="status-label">Composing</span>
            <span class="status-text">Writing the persona</span>
          </div>
          <div class="status-line">
            <span class="status-label">Finalizing</span>
            <span class="status-text">Loading...</span>
          </div>
        </div>
        <div class="progress-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </section>
  </body>
</html>
